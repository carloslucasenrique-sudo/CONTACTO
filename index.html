<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {
    font-family: Arial;
    background-color: #f0f8ff;
    text-align: center;
}

h2 {
    color: #4b0082;
}

form {
    background-color: #ffffff;
    padding: 15px;
    border-radius: 10px;
    width: 60%;
    margin: auto;
    box-shadow: 0px 0px 10px gray;
}

input {
    padding: 8px;
    margin: 5px;
    border: 2px solid #87cefa;
    border-radius: 5px;
}

button {
    background-color: #4b0082;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #6a0dad;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 70%;
    background-color: white;
}

th {
    background-color: #4b0082;
    color: white;
}

th, td {
    border: 1px solid black;
    padding: 10px;
    text-align: center;
}

tr:nth-child(even) {
    background-color: #e6e6fa;
}
</style>

</head>
<body>

<h2>Formulario de Contacto</h2>

<form id="formulario">
    Nombre: <input type="text" id="nombre" required>
    Apellido: <input type="text" id="apellido" required>
    Teléfono: <input type="tel" id="telefono" required>
    <button type="submit">Enviar</button>
</form>

<table id="tabla">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Teléfono</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let apellido = document.getElementById("apellido").value;
    let telefono = document.getElementById("telefono").value;

    let tabla = document.getElementById("tabla").getElementsByTagName("tbody")[0];

    let fila = tabla.insertRow();

    fila.insertCell(0).textContent = nombre;
    fila.insertCell(1).textContent = apellido;
    fila.insertCell(2).textContent = telefono;

    document.getElementById("formulario").reset();
});
</script>

</body>
</html>
